name: auto-commit-layer
description: "Layer granular conventional commits on top of the dev-story workflow — each completed task produces its own commit for better traceability and review"
author: "bmad-github"
version: "1.0.0"
extends-workflow: "dev-story"
extension-point: "post-task-completion"

# This extension adds automatic version control commits after each task is
# completed during story development. Instead of one large commit per story,
# each task gets its own commit with a conventional commit message.
#
# GitHub-independent: works with any git-based workflow. The commit prefix
# conventions follow the Conventional Commits specification
# (https://www.conventionalcommits.org/).

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflow-extensions/auto-commit-layer"
instructions: "{installed_path}/instructions.md"
